<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taxi MeikSwe</title>
    <style>
      body {
        margin: 0;
        background: #020617;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg,#020617 0%,#081028 45%,#0f172a 100%);
        z-index: 9999;
        transition: opacity 0.35s ease-out;
      }

      #splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top left,rgba(96,165,250,0.22),transparent 30%),radial-gradient(circle at bottom right,rgba(14,165,233,0.18),transparent 28%);
        pointer-events: none;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash img {
        width: 180px;
        height: auto;
        position: relative;
        z-index: 1;
      }

      #splash .spinner {
        margin-top: 24px;
        width: 28px;
        height: 28px;
        border: 2px solid rgba(255,255,255,0.08);
        border-top-color: rgba(255,255,255,0.5);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        position: relative;
        z-index: 1;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/Logo.svg" alt="Taxi MeikSwe" />
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
